<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puntualidad MBON</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --c1:#1e3a4a;--c2:#f0f4f5;--ink:#111827;--muted:#6b7280;
  --bg:#f3f4f6;--white:#fff;--border:#e5e7eb;
  --ok:#15803d;--ok-bg:#dcfce7;
  --late:#dc2626;--late-bg:#fee2e2;
  --warn:#b45309;--warn-bg:#fef3c7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--c1);padding:14px 20px;position:sticky;top:0;z-index:50}
.h-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:12px}
.h-icon{width:38px;height:38px;border:1.5px solid rgba(255,255,255,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-icon svg{width:20px;height:20px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:1.5}
header h1{font-size:15px;font-weight:600;color:#fff}
header p{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.h-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.h-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border:0.5px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 10px;font-size:10px;color:rgba(255,255,255,.8);letter-spacing:.4px}
.live-dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.live-dot.on{background:#86efac}.live-dot.off{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.last-update{font-size:10px;color:rgba(255,255,255,.5)}
.tabs{background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto}
.tabs-inner{max-width:960px;margin:0 auto;display:flex;padding:0 12px}
.tab{padding:11px 14px;font-size:12px;font-weight:500;color:var(--muted);border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;background:none;font-family:'Outfit',sans-serif}
.tab:hover{color:var(--c1)}.tab.active{color:var(--c1);border-bottom-color:var(--c1)}
.content{max-width:960px;margin:0 auto;padding:18px 16px}
.panel{display:none}.panel.active{display:block}
.loading{display:flex;flex-direction:column;align-items:center;padding:70px 20px;gap:14px}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--c1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:13px;color:var(--muted)}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:14px;font-size:13px;color:#991b1b;margin-bottom:14px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center}
.kpi-n{font-size:22px;font-weight:700;color:var(--c1);line-height:1}
.kpi-n.ok{color:var(--ok)}.kpi-n.late{color:var(--late)}.kpi-n.warn{color:var(--warn)}
.kpi-l{font-size:10px;color:var(--muted);margin-top:3px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.card-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:600}
.card-sub{font-size:11px;color:var(--muted)}
.card-body{padding:12px 14px}
.row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bg)}
.row:last-child{border-bottom:none}
.rn{font-size:11px;font-weight:700;color:var(--muted);width:20px;text-align:center;flex-shrink:0}
.rn.g1{color:#b45309}.rn.g2{color:#6b7280}.rn.g3{color:#92400e}
.rinfo{flex:1;min-width:0}
.rname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rsub{font-size:11px;color:var(--muted);margin-top:1px}
.rhora{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;flex-shrink:0;min-width:44px;text-align:right}
.rhora.ok{color:var(--ok)}.rhora.late{color:var(--late)}.rhora.warn{color:var(--warn)}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.late{background:var(--late-bg);color:var(--late)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.tag{display:inline-block;background:var(--c2);color:var(--c1);font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.search{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Outfit',sans-serif;background:var(--white);outline:none;margin-bottom:12px}
.search:focus{border-color:var(--c1)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:11px;font-weight:500;color:var(--muted);cursor:pointer}
.chip.active{background:var(--c2);border-color:var(--c1);color:var(--c1)}
.dia-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;margin-bottom:14px}
.dia-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer}
.dia-card:hover,.dia-card.sel{border-color:var(--c1);background:var(--c2)}
.dia-name{font-size:12px;font-weight:600}
.dia-hora{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;margin:5px 0 2px}
.dia-cnt{font-size:10px;color:var(--muted)}
.hist{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg)}
.hist:last-child{border-bottom:none}
.hist-f{font-size:11px;color:var(--muted);min-width:72px}
.hist-d{font-size:11px;color:var(--muted);min-width:54px}
.hist-h{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;flex:1}
.hist-dif{font-size:11px;font-weight:600;min-width:54px;text-align:right}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.two-col{grid-template-columns:1fr}}
.empty{text-align:center;padding:30px 20px;font-size:13px;color:var(--muted)}
footer{text-align:center;padding:22px;font-size:10px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;border-top:1px solid var(--border);margin-top:8px}
</style>
</head>
<body>

<script>
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbyQS2vSHYq-BdbYSml1EPaUFy7UQxCAqc4Ftof-Kp3qCuIkxIgnCmCl3eEDSU3F90v7iA/exec';
const REFRESH_SEG = 5;
const INICIO_MIN  = 8 * 60; // 8:00 AM
</script>

<header>
  <div class="h-inner">
    <div class="h-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div>
      <h1>Puntualidad MBON</h1>
      <p>Misión Boliviana Occidental Norte</p>
      <div class="h-meta">
        <div class="h-badge"><div class="live-dot on" id="liveDot"></div>En vivo</div>
        <div class="h-badge">Inicio: 8:00 AM</div>
        <div class="h-badge" id="modoBadge" style="cursor:pointer;user-select:none;" onclick="toggleModo()">
          <span id="modoIcon">⏸</span> <span id="modoLabel">30s</span>
        </div>
        <span class="last-update" id="lastUpdate"></span>
      </div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab active" onclick="showTab('grupos',this)">Grupos</button>
    <button class="tab" onclick="showTab('individual',this)">Individual</button>
    <button class="tab" onclick="showTab('dias',this)">Por día</button>
    <button class="tab" onclick="showTab('historial',this)">Historial</button>
  </div>
</div>

<div class="content">
  <div id="panelGrupos"    class="panel active"><div class="loading"><div class="spinner"></div><p>Cargando datos…</p></div></div>
  <div id="panelIndividual" class="panel"></div>
  <div id="panelDias"      class="panel"></div>
  <div id="panelHistorial" class="panel"></div>
</div>

<footer>© 2026 Misión Boliviana Occidental Norte · IASD</footer>

<script>
// ── ESTADO ────────────────────────────────────────────────────
let DATA = null;
let prevCount = null;
let tabActual = 'grupos';
let filtroGrupo = 'Todos';
let filtroBusq  = '';
let diaSelec    = null;
let refreshTimer = null;
let modoEscaneo  = false;

function toggleModo() {
  modoEscaneo = !modoEscaneo;
  const icon  = document.getElementById('modoIcon');
  const label = document.getElementById('modoLabel');
  const badge = document.getElementById('modoBadge');
  if (modoEscaneo) {
    icon.textContent  = '⚡';
    label.textContent = '3s — Escaneo activo';
    badge.style.background = 'rgba(134,239,172,.25)';
    badge.style.borderColor = 'rgba(134,239,172,.5)';
  } else {
    icon.textContent  = '⏸';
    label.textContent = '30s';
    badge.style.background = '';
    badge.style.borderColor = '';
  }
}

// ── TABS ──────────────────────────────────────────────────────
function showTab(id, btn) {
  tabActual = id;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (DATA) renderTabActual();
}

// ── HELPERS ───────────────────────────────────────────────────
function parseMin(f) {
  if (!f) return null;
  const p = f.trim().split(' ');
  if (p.length < 2) return null;
  const t = p[1].split(':');
  return parseInt(t[0]) * 60 + parseInt(t[1]);
}
function parseFecha(f) { return f ? f.trim().split(' ')[0] : ''; }
function parseHora(f)  { const p = f ? f.trim().split(' ') : []; return p.length > 1 ? p[1] : ''; }
function formatMin(m) {
  if (m === null) return '—';
  const h = Math.floor(m/60), mm = String(m%60).padStart(2,'0');
  return `${h%12||12}:${mm} ${h>=12?'PM':'AM'}`;
}
function clsDif(d) { if(d===null)return'warn'; if(d<=0)return'ok'; if(d<=15)return'warn'; return'late'; }
function lblDif(d) { if(d===null)return'—'; if(d<0)return`${Math.abs(d)}m antes`; if(d===0)return'Exacto'; return`+${d}m tarde`; }

// ── CALCULAR ──────────────────────────────────────────────────
function parseFechaNum(f) {
  // "19/04/2026" → 20260419 para comparar
  if (!f) return 0;
  const p = f.split('/');
  return p.length === 3 ? parseInt(p[2]+p[1]+p[0]) : 0;
}

function calcStats(registros) {
  const parsed = registros.map(r => ({
    ...r,
    fechaDate: parseFecha(r.fecha),
    horaStr:   parseHora(r.fecha),
    min:       parseMin(r.fecha),
  })).filter(r => r.min !== null);

  // Detectar última fecha con registros
  const ultimaFecha = parsed.reduce((max, r) =>
    parseFechaNum(r.fechaDate) > parseFechaNum(max) ? r.fechaDate : max, '');

  // Para el ranking de grupos: solo registros de la última fecha
  const parsedHoy = parsed.filter(r => r.fechaDate === ultimaFecha);

  // Por grupo (solo última fecha)
  const gmap = {};
  parsedHoy.forEach(r => {
    if (!gmap[r.grupo]) gmap[r.grupo] = [];
    gmap[r.grupo].push(r);
  });
  const totalPorGrupo = (DATA && DATA.totalPorGrupo) || {};
  const statsGrupo = Object.entries(gmap).map(([grupo, regs]) => {
    const mins      = regs.map(r => r.min);
    const prom      = Math.round(mins.reduce((a,b)=>a+b,0)/mins.length);
    const punt      = regs.filter(r => r.min <= INICIO_MIN).length;
    const esperados = totalPorGrupo[grupo] || regs.length;
    const pct       = Math.round(punt/esperados*100);
    return { grupo, total: regs.length, esperados, promMin: prom, puntuales: punt, pct };
  }).sort((a,b) => b.puntuales !== a.puntuales ? b.puntuales - a.puntuales : b.pct - a.pct);

  // Por persona
  const pmap = {};
  parsed.forEach(r => {
    if (!pmap[r.nombre]) pmap[r.nombre] = { nombre:r.nombre, grupo:r.grupo, regs:[] };
    pmap[r.nombre].regs.push(r);
  });
  const statsPersona = Object.values(pmap).map(p => {
    const mins = p.regs.map(r => r.min);
    const prom = Math.round(mins.reduce((a,b)=>a+b,0)/mins.length);
    const punt = p.regs.filter(r => r.min <= INICIO_MIN).length;
    const pct  = Math.round(punt/p.regs.length*100);
    return { ...p, total: p.regs.length, promMin: prom, puntuales: punt, pct };
  }).sort((a,b) => b.puntuales !== a.puntuales ? b.puntuales - a.puntuales : b.pct - a.pct);

  // Por día
  const dmap = {};
  parsed.forEach(r => {
    const d = r.dia||'Sin día';
    if (!dmap[d]) dmap[d] = [];
    dmap[d].push(r);
  });
  const statsDia = Object.entries(dmap).map(([dia, regs]) => {
    const mins = regs.map(r => r.min);
    const prom = Math.round(mins.reduce((a,b)=>a+b,0)/mins.length);
    const punt = regs.filter(r => r.min <= INICIO_MIN).length;
    const pct  = Math.round(punt/regs.length*100);
    return { dia, total: regs.length, promMin: prom, puntuales: punt, pct };
  }).sort((a,b) => b.puntuales - a.puntuales);

  const totalRegs  = parsed.length;
  const totalPunt  = parsed.filter(r => r.min <= INICIO_MIN).length;
  const totalTarde = totalRegs - totalPunt;
  const allMins    = parsed.map(r => r.min);
  const promGlobal = allMins.length ? Math.round(allMins.reduce((a,b)=>a+b,0)/allMins.length) : null;
  const pctGlobal  = totalRegs ? Math.round(totalPunt/totalRegs*100) : 0;

  return { parsed, parsedHoy, ultimaFecha, statsGrupo, statsPersona, statsDia, totalRegs, totalPunt, totalTarde, promGlobal, pctGlobal };
}

// ── RENDER: solo la pestaña activa ────────────────────────────
function renderTabActual() {
  const stats = calcStats(DATA.registros || []);
  if (tabActual === 'grupos')     renderGrupos(stats);
  if (tabActual === 'individual') renderIndividual(stats);
  if (tabActual === 'dias')       renderDias(stats);
  if (tabActual === 'historial')  renderHistorial(stats);
}

// ── RENDER ALL (primera carga) ────────────────────────────────
function renderAll() {
  const stats = calcStats(DATA.registros || []);
  renderGrupos(stats);
  renderIndividual(stats);
  renderDias(stats);
  renderHistorial(stats);
}

// ── GRUPOS ────────────────────────────────────────────────────
function renderGrupos(stats) {
  const { statsGrupo, totalRegs, totalPunt, totalTarde, pctGlobal, promGlobal, parsed, parsedHoy, ultimaFecha } = stats;
  const maxPunt = Math.max(...statsGrupo.map(g => g.puntuales), 1);

  // KPIs basados en la última fecha
  const totalRegsHoy  = parsedHoy.length;
  const totalPuntHoy  = parsedHoy.filter(r => r.min <= INICIO_MIN).length;
  const totalTardeHoy = totalRegsHoy - totalPuntHoy;
  const pctHoy        = totalRegsHoy ? Math.round(totalPuntHoy/totalRegsHoy*100) : 0;
  const allMinsHoy    = parsedHoy.map(r => r.min);
  const promHoy       = allMinsHoy.length ? Math.round(allMinsHoy.reduce((a,b)=>a+b,0)/allMinsHoy.length) : null;

  document.getElementById('panelGrupos').innerHTML = `
    <!-- GANADOR -->
    ${statsGrupo.length ? `
    <div style="background:var(--c1);border-radius:12px;padding:20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none"></div>
      <div style="width:52px;height:52px;border:1.5px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,.08);position:relative;z-index:1;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 20h20M4 20l2-8 6 4 6-4 2 8"/>
          <circle cx="12" cy="8" r="2" fill="rgba(255,255,255,.9)" stroke="none"/>
          <circle cx="4" cy="12" r="1.5" fill="rgba(255,255,255,.7)" stroke="none"/>
          <circle cx="20" cy="12" r="1.5" fill="rgba(255,255,255,.7)" stroke="none"/>
        </svg>
      </div>
      <div style="flex:1;position:relative;z-index:1;min-width:0;">
        <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:3px;">Grupo más puntual · ${ultimaFecha}</div>
        <div style="font-size:20px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${statsGrupo[0].grupo}</div>
        <div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-size:12px;font-weight:600;color:rgba(255,255,255,.9)">${statsGrupo[0].puntuales}/${statsGrupo[0].esperados} puntuales</span>
          <span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.4)"></span>
          <span style="font-size:12px;color:rgba(255,255,255,.7)">${statsGrupo[0].pct}% del grupo</span>
          <span style="width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.4)"></span>
          <span style="font-size:12px;color:rgba(255,255,255,.7)">Promedio ${formatMin(statsGrupo[0].promMin)}</span>
        </div>
      </div>
      <div style="font-size:72px;font-weight:800;color:rgba(255,255,255,.06);position:absolute;right:16px;top:50%;transform:translateY(-50%);line-height:1;pointer-events:none;">${statsGrupo[0].puntuales}</div>
    </div>` : ''}

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-n">${totalRegsHoy}</div><div class="kpi-l">Escaneos</div></div>
      <div class="kpi"><div class="kpi-n ok">${totalPuntHoy}</div><div class="kpi-l">Puntuales</div></div>
      <div class="kpi"><div class="kpi-n late">${totalTardeHoy}</div><div class="kpi-l">Tarde</div></div>
      <div class="kpi"><div class="kpi-n ${pctHoy>=80?'ok':pctHoy>=50?'warn':'late'}">${pctHoy}%</div><div class="kpi-l">Puntualidad</div></div>
      <div class="kpi"><div class="kpi-n ${clsDif(promHoy?promHoy-INICIO_MIN:null)}">${formatMin(promHoy)}</div><div class="kpi-l">Hora promedio</div></div>
    </div>

    <!-- RANKING GRUPOS -->
    <div class="card">
      <div class="card-head"><span class="card-title">Ranking por grupos</span><span class="card-sub">${ultimaFecha} · Por cantidad de puntuales</span></div>
      <div class="card-body">
        ${statsGrupo.map((g,i) => {
          const cls = g.pct>=80?'ok':g.pct>=50?'warn':'late';
          const barW = Math.round(g.puntuales/maxPunt*100);
          const top3 = parsedHoy.filter(r=>r.grupo===g.grupo&&r.min<=INICIO_MIN).sort((a,b)=>(a.min||0)-(b.min||0)).slice(0,3);
          return `<div class="row">
            <div class="rn ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
            <div class="rinfo">
              <div class="rname">${g.grupo}</div>
              <div class="rsub">${g.puntuales}/${g.esperados} puntuales · ${g.pct}%${g.total < g.esperados ? ` <span style="color:var(--warn);font-size:10px;">(${g.total} escaneados)</span>` : ''}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
                <div style="flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;"><div style="width:${barW}%;height:100%;border-radius:3px;background:var(--${cls==='ok'?'ok':cls==='warn'?'warn':'late'});transition:width .5s;"></div></div>
                <span class="badge ${cls}">${g.puntuales}</span>
              </div>
              ${top3.length?`<div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;">${top3.map(r=>`<span style="font-size:10px;background:var(--ok-bg);color:var(--ok);padding:1px 6px;border-radius:10px;">${r.nombre.split(' ')[0]} <span style="font-family:'DM Mono',monospace;">${r.horaStr}</span></span>`).join('')}</div>`:''}
            </div>
            <div class="rhora ${cls}">${formatMin(g.promMin)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- DETALLE POR GRUPO -->
    <div class="card">
      <div class="card-head"><span class="card-title">Detalle por grupo</span><span class="card-sub">${ultimaFecha}</span></div>
      <div class="card-body">
        ${statsGrupo.map(g => {
          const punt  = parsedHoy.filter(r=>r.grupo===g.grupo&&r.min<=INICIO_MIN).sort((a,b)=>(a.min||0)-(b.min||0));
          const tarde = parsedHoy.filter(r=>r.grupo===g.grupo&&r.min>INICIO_MIN).sort((a,b)=>(a.min||0)-(b.min||0));
          const cls   = g.pct>=80?'ok':g.pct>=50?'warn':'late';
          return `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bg);">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
              <span style="font-size:13px;font-weight:600;">${g.grupo}</span>
              <span class="badge ${cls}">${g.pct}% · ${g.puntuales}/${g.esperados}</span>
            </div>
            ${punt.length?`<div style="font-size:11px;color:var(--ok);font-weight:500;margin-bottom:4px;">Puntuales (${punt.length})</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">${punt.map(r=>`<div style="background:var(--ok-bg);border:1px solid #86efac;border-radius:8px;padding:4px 8px;font-size:11px;"><span style="font-weight:500;color:var(--ok);">${r.nombre.split(' ').slice(0,2).join(' ')}</span> <span style="font-family:'DM Mono',monospace;color:var(--ok);">${r.horaStr}</span></div>`).join('')}</div>`:''}
            ${tarde.length?`<div style="font-size:11px;color:var(--late);font-weight:500;margin-bottom:4px;">Tarde (${tarde.length})</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;">${tarde.map(r=>`<div style="background:var(--late-bg);border:1px solid #fca5a5;border-radius:8px;padding:4px 8px;font-size:11px;"><span style="font-weight:500;color:var(--late);">${r.nombre.split(' ').slice(0,2).join(' ')}</span> <span style="font-family:'DM Mono',monospace;color:var(--late);">${r.horaStr}</span></div>`).join('')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ── INDIVIDUAL ────────────────────────────────────────────────
function renderIndividual(stats) {
  const { statsPersona, parsed } = stats;
  const grupos   = ['Todos', ...new Set(statsPersona.map(p=>p.grupo))].filter(Boolean);
  const filtered = statsPersona.filter(p =>
    (filtroGrupo==='Todos'||p.grupo===filtroGrupo) &&
    (!filtroBusq||p.nombre.toLowerCase().includes(filtroBusq.toLowerCase()))
  );

  document.getElementById('panelIndividual').innerHTML = `
    <input class="search" id="srch" placeholder="Buscar persona…" value="${filtroBusq}"
      oninput="filtroBusq=this.value;renderIndividualOnly()">
    <div class="chips">${grupos.map(g=>`<div class="chip ${filtroGrupo===g?'active':''}"
      onclick="filtroGrupo='${g}';document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));this.classList.add('active');renderIndividualOnly()">${g}</div>`).join('')}</div>
    <div class="card">
      <div class="card-head"><span class="card-title">Ranking individual</span><span class="card-sub">${filtered.length} personas</span></div>
      <div class="card-body" id="rankBody">${renderRankRows(filtered)}</div>
    </div>`;
}

function renderIndividualOnly() {
  if (!DATA) return;
  const stats = calcStats(DATA.registros||[]);
  const filtered = stats.statsPersona.filter(p =>
    (filtroGrupo==='Todos'||p.grupo===filtroGrupo) &&
    (!filtroBusq||p.nombre.toLowerCase().includes(filtroBusq.toLowerCase()))
  );
  const b = document.getElementById('rankBody');
  if (b) b.innerHTML = renderRankRows(filtered);
}

function renderRankRows(list) {
  if (!list.length) return '<div class="empty">Sin resultados</div>';
  return list.map((p,i) => {
    const dif = p.promMin - INICIO_MIN;
    const cls = clsDif(dif);
    return `<div class="row">
      <div class="rn ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
      <div class="rinfo">
        <div class="rname">${p.nombre}</div>
        <div class="rsub"><span class="tag">${p.grupo}</span> · ${p.puntuales}/${p.total} puntual · ${p.pct}%</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div class="rhora ${cls}">${formatMin(p.promMin)}</div>
        <div style="font-size:10px;color:var(--${cls==='ok'?'ok':cls==='warn'?'warn':'late'});">${lblDif(dif)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── DÍAS ──────────────────────────────────────────────────────
function renderDias(stats) {
  const { statsDia, parsed } = stats;
  const regsDia = diaSelec ? parsed.filter(r=>r.dia===diaSelec) : [];

  document.getElementById('panelDias').innerHTML = `
    <div class="dia-grid">
      ${statsDia.map(d => {
        const cls = d.pct>=80?'ok':d.pct>=50?'warn':'late';
        return `<div class="dia-card ${diaSelec===d.dia?'sel':''}" onclick="diaSelec='${d.dia}';renderDiasOnly()">
          <div class="dia-name">${d.dia}</div>
          <div class="dia-hora" style="color:var(--${cls==='ok'?'ok':cls==='warn'?'warn':'late'})">${formatMin(d.promMin)}</div>
          <div class="dia-cnt">${d.total} registros · ${d.pct}% puntual</div>
        </div>`;
      }).join('')}
    </div>
    ${diaSelec ? `
    <div class="card">
      <div class="card-head"><span class="card-title">${diaSelec}</span><span class="card-sub">${regsDia.length} registros</span></div>
      <div class="card-body">
        ${regsDia.sort((a,b)=>(a.min||0)-(b.min||0)).map(r => {
          const dif = r.min - INICIO_MIN;
          const cls = clsDif(dif);
          return `<div class="hist">
            <div class="hist-f">${r.fechaDate}</div>
            <div class="hist-h ${cls}">${r.horaStr}</div>
            <div class="rinfo"><div class="rname" style="font-size:12px;">${r.nombre}</div>
              <div class="rsub"><span class="tag">${r.grupo}</span></div></div>
            <div class="hist-dif" style="color:var(--${cls==='ok'?'ok':cls==='warn'?'warn':'late'})">${lblDif(dif)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '<div class="empty">Selecciona un día para ver el detalle</div>'}`;
}

function renderDiasOnly() {
  if (!DATA) return;
  renderDias(calcStats(DATA.registros||[]));
}

// ── HISTORIAL ─────────────────────────────────────────────────
function renderHistorial(stats) {
  const { parsed } = stats;
  const sorted = [...parsed].sort((a,b) => b.fechaDate.localeCompare(a.fechaDate)||(a.min||0)-(b.min||0));

  document.getElementById('panelHistorial').innerHTML = `
    <div class="card">
      <div class="card-head"><span class="card-title">Historial completo</span><span class="card-sub">${sorted.length} registros</span></div>
      <div class="card-body">
        ${sorted.length ? sorted.map(r => {
          const dif = r.min - INICIO_MIN;
          const cls = clsDif(dif);
          return `<div class="hist">
            <div class="hist-f">${r.fechaDate}</div>
            <div class="hist-d">${r.dia}</div>
            <div class="hist-h ${cls}">${r.horaStr}</div>
            <div class="rinfo"><div class="rname" style="font-size:12px;">${r.nombre}</div>
              <div class="rsub"><span class="tag">${r.grupo}</span></div></div>
            <div class="hist-dif" style="color:var(--${cls==='ok'?'ok':cls==='warn'?'warn':'late'})">${lblDif(dif)}</div>
          </div>`;
        }).join('') : '<div class="empty">Sin registros</div>'}
      </div>
    </div>`;
}

// ── FETCH JSONP ───────────────────────────────────────────────
async function fetchData() {
  const cbName = 'cb_' + Date.now();
  const url = GAS_URL + '?vista=puntualidad&callback=' + cbName;

  await new Promise(resolve => {
    const script = document.createElement('script');
    const timer  = setTimeout(() => { cleanup(); setLive(false); resolve(); }, 10000);

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[cbName] = json => {
      cleanup();
      if (json && json.registros) {
        const isFirstLoad = prevCount === null;
        // Hash basado en nombre+fecha de todos los registros para detectar cualquier cambio
        const newHash = json.registros.map(r => r.nombre + r.fecha).join('|');
        const changed = newHash !== prevCount;
        prevCount = newHash;
        DATA = json;
        setLive(true);
        updateTs();
        if (isFirstLoad) {
          renderAll();
        } else if (changed) {
          renderTabActual();
        }
      } else {
        setLive(false);
      }
      resolve();
    };

    script.onerror = () => { cleanup(); setLive(false); resolve(); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function setLive(on) {
  const d = document.getElementById('liveDot');
  if (d) d.className = 'live-dot ' + (on?'on':'off');
}
function updateTs() {
  const el = document.getElementById('lastUpdate');
  if (el) el.textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── POLLING ──────────────────────────────────────────────────
function poll() {
  fetchData().finally(() => {
    const seg = modoEscaneo ? REFRESH_SEG : 5;
    setTimeout(poll, seg * 1000);
  });
}

poll();
</script>
